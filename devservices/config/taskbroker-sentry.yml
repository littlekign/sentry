# Sentry's own taskbroker for raw-mode topics. The regular taskworker /
# taskworker_dlq topics are owned by the generic `taskbroker` remote
# dependency instead, so this only produces retries/deadletters into them.
#
# Topics live in this config file (rather than env vars on the service)
# because env-var config keys can't contain hyphens, and several topic names
# do.
kafka_deadletter_topic: taskworker_dlq
kafka_retry_topic: taskworker
create_missing_topics: true

kafka_clusters:
  default:
    address: kafka-kafka-1:9093

kafka_topics:
  taskworker:
    cluster: default
    consumer_group: taskbroker-sentry
    produce_only: true
  taskworker_dlq:
    cluster: default
    consumer_group: taskbroker-sentry
    produce_only: true

  # ingest-profiles raw mode (STREAM-1041). Raw Kafka messages on the
  # profiles topic are turned into activations for the profile-processing task.
  profiles:
    cluster: default
    consumer_group: ingest-profiles
    raw:
      namespace: ingest.profiling.passthrough
      application: sentry
      taskname: sentry.profiles.task.process_profile_from_kafka
      processing_deadline_duration: 30

  # Subscription-result raw mode (STREAM-1207).
  events-subscription-results:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: snuba.subscriptions.events.raw
      application: sentry
      taskname: sentry.snuba.query_subscriptions.run.process_events_subscription_from_kafka
      processing_deadline_duration: 60
  transactions-subscription-results:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: snuba.subscriptions.transactions.raw
      application: sentry
      taskname: sentry.snuba.query_subscriptions.run.process_transactions_subscription_from_kafka
      processing_deadline_duration: 60
  metrics-subscription-results:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: snuba.subscriptions.metrics.raw
      application: sentry
      taskname: sentry.snuba.query_subscriptions.run.process_metrics_subscription_from_kafka
      processing_deadline_duration: 60
  generic-metrics-subscription-results:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: snuba.subscriptions.generic_metrics.raw
      application: sentry
      taskname: sentry.snuba.query_subscriptions.run.process_generic_metrics_subscription_from_kafka
      processing_deadline_duration: 60
  subscription-results-eap-items:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: snuba.subscriptions.eap.raw
      application: sentry
      taskname: sentry.snuba.query_subscriptions.run.process_eap_subscription_from_kafka
      processing_deadline_duration: 60

  # ingest-replay-recordings raw mode (STREAM-1287). Raw Kafka messages on the
  # recordings topic are turned into activations for the recording task, so no
  # dedicated Kafka consumer is needed.
  ingest-replay-recordings:
    cluster: default
    consumer_group: sentry-consumer
    raw:
      namespace: replays.raw
      application: sentry
      taskname: sentry.replays.tasks.process_replay_recording
      processing_deadline_duration: 90
