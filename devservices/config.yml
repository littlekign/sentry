services:
  bigtable:
    image: 'ghcr.io/getsentry/cbtemulator:d28ad6b63e461e8c05084b8c83f1c06627068c04'
    ports:
      - '127.0.0.1:8086:8086'
    networks:
      - devservices
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - orchestrator=devservices
  redis-cluster:
    image: ghcr.io/getsentry/docker-redis-cluster:7.0.10
    ports:
      - '127.0.0.1:7000:7000'
      - '127.0.0.1:7001:7001'
      - '127.0.0.1:7002:7002'
      - '127.0.0.1:7003:7003'
      - '127.0.0.1:7004:7004'
      - '127.0.0.1:7005:7005'
    networks:
      - devservices
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      - IP=0.0.0.0
    labels:
      - orchestrator=devservices
  memcached:
    image: ghcr.io/getsentry/image-mirror-library-memcached:1.5-alpine
    ports:
      - '127.0.0.1:11211:11211'
    networks:
      - devservices
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - orchestrator=devservices
  spotlight:
    image: ghcr.io/getsentry/spotlight:7640f9ff4be79a934e5cac8b255d2a2055ceeb28
    healthcheck:
      interval: 1s
      timeout: 1s
      retries: 3
    restart: unless-stopped
    ports:
      - '127.0.0.1:8969:8969/tcp'
    networks:
      - devservices
    labels:
      - orchestrator=devservices
  # Relay chain for the `cell-routing` mode. These exercise Relay's
  # advertised-upstream routing entirely from sentry's devservices: the
  # `advertised_upstream` value lives in relay-cell.yml (mounted only here), so
  # the default `relay` service and its config are untouched. relay-cell is the
  # processing terminus (replaces plain `relay` here); relay-edge forwards.
  relay-cell:
    image: ghcr.io/getsentry/relay:nightly
    command: [run, --config, /etc/relay]
    healthcheck:
      test:
        ['CMD', '/bin/relay', '--config', '/etc/relay', 'healthcheck', '--mode', 'live']
      interval: 5s
      timeout: 5s
      retries: 3
    ports:
      - 127.0.0.1:7900:7900
    volumes:
      - ./config/relay-cell.yml:/etc/relay/config.yml
      - ./config/relay-cell-credentials.json:/etc/relay/credentials.json
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - devservices
    labels:
      - orchestrator=devservices
    restart: unless-stopped
  relay-edge:
    image: ghcr.io/getsentry/relay:nightly
    command: [run, --config, /etc/relay]
    healthcheck:
      test:
        ['CMD', '/bin/relay', '--config', '/etc/relay', 'healthcheck', '--mode', 'live']
      interval: 5s
      timeout: 5s
      retries: 3
    ports:
      - 127.0.0.1:7899:7899
    volumes:
      - ./config/relay-edge.yml:/etc/relay/config.yml
      - ./config/relay-edge-credentials.json:/etc/relay/credentials.json
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - devservices
    labels:
      - orchestrator=devservices
    restart: unless-stopped
  taskbroker-sentry:
    image: ghcr.io/getsentry/taskbroker:nightly
    command: ['/opt/taskbroker', '--config', '/etc/taskbroker/config.yml']
    ports:
      - '127.0.0.1:50052:50051'
    volumes:
      - ./config/taskbroker-sentry.yml:/etc/taskbroker/config.yml
    networks:
      - devservices
    extra_hosts:
      - host.docker.internal:host-gateway
    labels:
      - orchestrator=devservices
    restart: unless-stopped
    platform: linux/amd64

networks:
  devservices:
    name: devservices
    external: true
