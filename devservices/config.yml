# Ignored by docker compose, used by devservices
x-sentry-service-config:
  version: 0.1
  service_name: sentry
  dependencies:
    #########################################################
    # Docker Compose Services
    #########################################################
    snuba:
      description: Service that provides fast aggregation and query capabilities on top of Clickhouse
      remote:
        repo_name: snuba
        branch: master
        repo_link: https://github.com/getsentry/snuba.git
        mode: containerized
    snuba-profiling:
      description: Service that provides fast aggregation and query capabilities on top of Clickhouse that includes profiling consumers
      remote:
        repo_name: snuba
        branch: master
        repo_link: https://github.com/getsentry/snuba.git
        mode: containerized-profiles
    snuba-metrics:
      description: Service that provides fast aggregation and query capabilities on top of Clickhouse that includes metrics consumers
      remote:
        repo_name: snuba
        branch: master
        repo_link: https://github.com/getsentry/snuba.git
        mode: containerized-metrics-dev
    relay:
      description: Service event forwarding and ingestion service
      remote:
        repo_name: relay
        branch: master
        repo_link: https://github.com/getsentry/relay.git
        mode: containerized
    postgres:
      description: Shared instance of postgres used by sentry services
      remote:
        repo_name: sentry-shared-postgres
        branch: main
        repo_link: https://github.com/getsentry/sentry-shared-postgres.git
    redis:
      description: Shared instance of redis used by sentry services
      remote:
        repo_name: sentry-shared-redis
        branch: main
        repo_link: https://github.com/getsentry/sentry-shared-redis.git
    symbolicator:
      description: A symbolication service for native stacktraces and minidumps with symbol server support
      remote:
        repo_name: symbolicator
        branch: master
        repo_link: https://github.com/getsentry/symbolicator.git
        mode: default
    launchpad:
      description: Service for analyzing iOS and Android apps
      remote:
        repo_name: launchpad
        branch: main
        repo_link: https://github.com/getsentry/launchpad.git
        mode: containerized
    uptime-checker:
      description: Service powering Sentry's uptime detection features
      remote:
        repo_name: uptime-checker
        branch: main
        repo_link: https://github.com/getsentry/uptime-checker.git
        mode: containerized
    vroom:
      description: Sentry's profiling service, processing and deriving data about your profiles
      remote:
        repo_name: vroom
        branch: main
        repo_link: https://github.com/getsentry/vroom.git
        mode: default
    bigtable:
      description: Bigtable emulator
    redis-cluster:
      description: Redis cluster used for testing
    chartcuterie:
      description: Chartcuterie is a service that generates charts
      remote:
        repo_name: chartcuterie
        branch: master
        repo_link: https://github.com/getsentry/chartcuterie.git
    # Must stay a remote dependency (STREAM-1613): remote deps resolve to one
    # container shared across all repos that depend on it, so this stays a
    # single instance instead of colliding on port 50051 with e.g. Seer's.
    taskbroker:
      description: Service used to process asynchronous tasks
      remote:
        repo_name: taskbroker
        branch: main
        repo_link: https://github.com/getsentry/taskbroker.git
        mode: containerized
    # Sentry's own taskbroker for tasks internal to Sentry, mostly raw-mode
    # topics (ingest-profiles, subscription results, replay recordings).
    # Local rather than remote since it needs a custom mounted config.
    taskbroker-sentry:
      description: Sentry's own taskbroker for tasks internal to Sentry, mostly raw-mode topics (ingest-profiles, subscription results, replay recordings)
    memcached:
      description: Memcached used for caching
    spotlight:
      description: Spotlight server for local debugging
    # Local Relays used only by the `cell-routing` mode to exercise Relay's
    # advertised-upstream routing without touching the relay repo or the default
    # `relay` config. relay-cell replaces the plain `relay` in this mode.
    relay-cell:
      description: Processing Relay terminus that advertises an upstream (cell-routing only)
    relay-edge:
      description: Downstream Relay that routes on the advertised upstream (cell-routing only)
    objectstore:
      description: Storage for files and blobs
      remote:
        repo_name: objectstore
        branch: main
        repo_link: https://github.com/getsentry/objectstore.git
        mode: containerized
    synapse:
      description: Cell routing services (proxy + ingest-router)
      remote:
        repo_name: synapse
        branch: main
        repo_link: https://github.com/getsentry/synapse.git
        mode: default
    #########################################################
    # Supervisor Programs
    #########################################################
    # Taskworker services
    taskworker:
      description: Workers that process tasks from the taskbroker
    taskworker-sentry:
      description: Workers that process tasks internal to Sentry (mostly raw-mode) from taskbroker-sentry
    taskworker-scheduler:
      description: Task scheduler that can spawn tasks based on their schedules
    # Kafka consumer services for event ingestion
    ingest-events:
      description: Kafka consumer for processing ingested events
    ingest-attachments:
      description: Kafka consumer for processing ingested attachments
    ingest-transactions:
      description: Kafka consumer for processing ingested transactions
    ingest-monitors:
      description: Kafka consumer for processing monitor check-ins
    ingest-occurrences:
      description: Kafka consumer for processing issue occurrences
    ingest-feedback-events:
      description: Kafka consumer for processing user feedback events
    # Monitor-related services
    monitors-clock-tick:
      description: Kafka consumer for monitor clock ticks
    monitors-clock-tasks:
      description: Kafka consumer for monitor clock tasks
    monitors-incident-occurrences:
      description: Kafka consumer for monitor incident occurrences
    # Spans and performance monitoring
    process-spans:
      description: Kafka consumer for processing spans data
    process-segments:
      description: Kafka consumer for processing performance segments
    # Metrics-related consumers
    ingest-metrics:
      description: Kafka consumer for processing metrics data
    ingest-generic-metrics:
      description: Kafka consumer for processing generic metrics
    billing-metrics-consumer:
      description: Kafka consumer for billing metrics processing
    # Post-processing forwarders
    post-process-forwarder-errors:
      description: Post-process forwarder for error events
    post-process-forwarder-transactions:
      description: Post-process forwarder for transaction events
    post-process-forwarder-issue-platform:
      description: Post-process forwarder for issue platform events
    # Uptime monitoring
    uptime-results:
      description: Kafka consumer for uptime monitoring results

  modes:
    default: [snuba, postgres, relay, spotlight, objectstore]
    migrations: [postgres, redis]
    acceptance-ci: [postgres, snuba, chartcuterie]
    chartcuterie: [postgres, snuba, chartcuterie, spotlight]
    launchpad:
      [
        snuba,
        postgres,
        launchpad,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
        objectstore,
      ]
    taskbroker: [snuba, postgres, relay, spotlight, taskbroker, taskbroker-sentry]
    taskworker:
      [
        snuba,
        postgres,
        relay,
        taskbroker,
        taskbroker-sentry,
        spotlight,
        taskworker,
        taskworker-sentry,
        taskworker-scheduler,
      ]
    backend-ci:
      [snuba, postgres, redis, bigtable, redis-cluster, symbolicator, objectstore]
    symbolicator: [postgres, snuba, symbolicator, spotlight, objectstore]
    memcached: [postgres, snuba, memcached, spotlight]
    tracing:
      [
        postgres,
        snuba-metrics,
        relay,
        spotlight,
        ingest-events,
        ingest-transactions,
        ingest-metrics,
        ingest-generic-metrics,
        billing-metrics-consumer,
        post-process-forwarder-errors,
        post-process-forwarder-transactions,
        post-process-forwarder-issue-platform,
        process-spans,
        ingest-occurrences,
        process-segments,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
      ]
    crons:
      [
        postgres,
        snuba,
        relay,
        spotlight,
        ingest-monitors,
        monitors-clock-tick,
        monitors-clock-tasks,
        monitors-incident-occurrences,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
      ]
    profiling:
      [
        postgres,
        snuba-profiling,
        relay,
        vroom,
        spotlight,
        ingest-events,
        ingest-transactions,
        ingest-occurrences,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
        post-process-forwarder-errors,
        post-process-forwarder-transactions,
      ]
    replay:
      [
        postgres,
        snuba,
        relay,
        spotlight,
        ingest-events,
        ingest-transactions,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
      ]
    ingest:
      [
        snuba,
        postgres,
        relay,
        spotlight,
        objectstore,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
        ingest-events,
        ingest-transactions,
        ingest-attachments,
        post-process-forwarder-errors,
        post-process-forwarder-transactions,
        post-process-forwarder-issue-platform,
      ]
    evals:
      [
        snuba,
        postgres,
        relay,
        spotlight,
        objectstore,
        taskbroker,
        taskbroker-sentry,
        taskworker,
        taskworker-sentry,
        ingest-events,
        post-process-forwarder-errors,
      ]
    minimal: [postgres, snuba]
    cell-routing:
      [
        postgres,
        snuba,
        redis,
        taskbroker,
        taskbroker-sentry,
        spotlight,
        objectstore,
        synapse,
        taskworker,
        taskworker-sentry,
        taskworker-scheduler,
        ingest-events,
        post-process-forwarder-errors,
        relay-cell,
        relay-edge,
      ]
    # The minimal set of services Symbolicator needs to run
    # Sentry integration tests.
    symbolicator-tests: [postgres, snuba, objectstore]
    uptime:
